        * {
            margin: 0;
            padding: 0;

        body {

        .app-container {
            width: 100%;
            max-width: 380px;
            background-color: #1e1e2f; 
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);

            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* হেডার বা মেইন টাইটেল */
        .header {
            text-align: center;
            padding: 25px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

            font-size: 36px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(255, 65, 108, 0.3);
        }

        /* সেকশন কন্টেইনার */
        .section {
            padding: 20px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .section:last-child {
            border-bottom: none;
        }

        /* সেকশন টাইটেল */
        .section-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* আলাদা আলাদা সেকশনের জন্য আলাদা কালার */
        .color-cyan { color: #00d2ff; }
        .color-green { color: #00ff87; }
        .color-purple { color: #b336ff; }
        .color-red { color: #ff3366; }

        /* বাটন গ্রিড লেআউট */
        .btn-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn-grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* প্রফেশনাল বাটন (লিংক) ডিজাইন */
        .btn {
            background: #2a2a40;
            color: #ffffff;
            border: 1px solid #3f3f5a;
            border-radius: 10px;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none; /* লিংকের নিচের দাগ সরানোর জন্য */
            text-align: center;
        }

        /* বাটনের হোভার (মাউস রাখলে যা হবে) ডিজাইন */
        .btn:hover {
            transform: translateY(-3px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        /* বাটনে ক্লিক করার ইফেক্ট */
        .btn:active {
            transform: translateY(1px);
        }

        /* আলাদা সেকশনের বাটনের হোভার কালার */
        .sec-cyan .btn:hover { border-color: #00d2ff; background: rgba(0, 210, 255, 0.1); color: #00d2ff;}

        .sec-red .btn:hover { border-color: #ff3366; background: rgba(255, 51, 102, 0.1); color: #ff3366;}
